<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#8ccbbd" />
    <title>Tareeqah is offline</title>
    <style>
      :root {
        color: #26323a;
        background: #f2f4f5;
        font-family: ui-rounded, "SF Pro Rounded", "Nunito Sans", Aptos, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(360px, 100%);
        border-radius: 28px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(38, 50, 58, 0.12);
      }

      .mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #e7f3f8;
        color: #2f8fb3;
        font-size: 28px;
        font-weight: 800;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #6b747b;
        font-size: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ت</div>
      <h1>You are offline</h1>
      <p>Reconnect to load class details, inbox updates, and payments.</p>
    </main>
  </body>
</html>
